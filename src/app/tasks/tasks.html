<section id="tasks">
  <header>
    <h2>Tasks of {{user.name}}</h2>
    <menu>
      <!--
        <button command="show-modal" commandfor="new-task">Add task</button>
      -->
      <button (click)="onStartAddTask()">Add Task</button>
    </menu>
  </header>
  <ul>
    @for(task of selectedUserTasks; track task.id) {
      <li>
        <app-task [task]="task" (complete)="onCompleteTask($event)" />
      </li>
    }
  </ul>
  @if (addingTask()) {
    <app-new-task [user]="user" />
  }
</section>
